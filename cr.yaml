# chart-releaser config consumed by .github/workflows/release.yml.
#
# Signing flags are passed to `cr package` (the action doesn't expose them
# as inputs, but cr reads them from this config file).
#
# Layout: with packages_with_index=true, both the .tgz packages and the
# index.yaml live at the gh-pages root, served at https://kube.imageengine.io/.
# .prov files are mirrored into the same location by a follow-up workflow
# step, since chart-releaser doesn't publish them to gh-pages itself.
sign: true
key: "releases@imageengine.io"
keyring: "/tmp/imageengine-secring.gpg"
passphrase-file: "/tmp/imageengine-passphrase"
