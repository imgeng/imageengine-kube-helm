name: Release Charts

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          printf '%s' "$GPG_PASSPHRASE" > /tmp/imageengine-passphrase
          chmod 600 /tmp/imageengine-passphrase
          gpg --batch --pinentry-mode=loopback \
              --passphrase-file /tmp/imageengine-passphrase \
              --export-secret-keys \
              --output /tmp/imageengine-secring.gpg \
              releases@imageengine.io
          chmod 600 /tmp/imageengine-secring.gpg

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        id: cr
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          packages_with_index: true
          config: cr.yaml
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish .prov files to gh-pages
        if: steps.cr.outputs.changed_charts != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          git fetch origin gh-pages
          worktree=$(mktemp -d -t ghpages.XXXX)
          git worktree add "$worktree" gh-pages
          pushd "$worktree" >/dev/null

          changed=false
          for tgz in *.tgz; do
            [ -f "$tgz" ] || continue
            prov="${tgz}.prov"
            [ -f "$prov" ] && continue
            tag="${tgz%.tgz}"
            if gh release download "$tag" --repo "$GITHUB_REPOSITORY" \
                 --pattern '*.prov' --dir . 2>/dev/null; then
              git add "$prov"
              changed=true
            fi
          done

          if [ "$changed" = true ]; then
            git commit -m "Publish .prov files for $(date -u +%Y-%m-%dT%H:%M:%SZ) release"
            git push origin gh-pages
          fi

          popd >/dev/null
          git worktree remove "$worktree" --force
