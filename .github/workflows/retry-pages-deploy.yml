name: Retry Pages Deploy

on:
  workflow_run:
    workflows: ["pages build and deployment"]
    types: [completed]

permissions:
  actions: write

jobs:
  retry:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'gh-pages' && github.event.workflow_run.run_attempt < 3 }}
    runs-on: ubuntu-latest
    steps:
      - name: Rerun failed jobs
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: gh api -X POST repos/${REPOSITORY}/actions/runs/${RUN_ID}/rerun-failed-jobs
