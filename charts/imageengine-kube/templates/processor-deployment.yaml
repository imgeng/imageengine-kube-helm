{{- if .Values.backendStack.enabled }}
# ImageEngine Kube Processor Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "imageengine.fullname" . }}-processor
spec:
  replicas: {{ .Values.processor.replicaCount }}
  minReadySeconds: {{ .Values.processor.minReadySeconds | default 0 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: {{ include "imageengine.name" . }}
      tier: processor
  template:
    metadata:
      labels:
        app: {{ include "imageengine.name" . }}
        tier: processor
      {{- with .Values.processor.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        fsGroup: 1000
      imagePullSecrets:
        - name: {{ .Values.secrets.imagePullSecretName }}
      {{- with .Values.processor.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.processor.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.processor.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.processor.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ include "imageengine.name" . }}
              tier: processor
      {{- end }}
      containers:
        - name: processor
          image: "{{ .Values.processor.image.repository }}:{{ .Values.images.processor }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
              add:
              - CHOWN
              - SETUID
              - SETGID
          resources:
            {{- toYaml .Values.processor.resources | nindent 12 }}
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 9464
              name: metrics
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: IE_PROCESSOR_BIND_HOSTPORT
              value: "0.0.0.0:8000"
            # OSC sharding client: one OSC{N}_HOST per cache shard (see helper)
            {{- include "imageengine.oscShardEnv" . | nindent 12 }}
            # Secrets
            - name: IE_PROCESSOR_SENTRY_DSN
              value: {{ .Values.sentry.PROCESSOR_DSN | quote }}
            # Env vars for statistics
            {{- include "imageengine.identityEnv" $ | nindent 12 }}
            {{- include "imageengine.derivedEnv" (dict "name" "IE_PROCESSOR_SENTRY_ENV" "value" (include "imageengine.appEnv" $) "env" $.Values.processor.env) | nindent 12 }}
            {{- include "imageengine.otelEnv" (dict "ctx" $ "enableVar" "IE_PROCESSOR_OTEL_ENABLED") | nindent 12 }}
            # Env vars below this line are from values.yaml
            {{- range $key, $value := .Values.processor.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
{{- end }}

