{{- if .Values.ingress.enabled -}}
{{- $root := . }}
{{- /* Target the edge Service when the frontend tier is present; on a
       backend-only install (frontend.enabled=false) route to the backend
       Service instead (ADR 0021). */ -}}
{{- $svcName := printf "%s-edge" (include "imageengine.fullname" .) -}}
{{- $svcPort := .Values.service.port -}}
{{- if not .Values.frontend.enabled -}}
{{- $svcName = printf "%s-backend" (include "imageengine.fullname" .) -}}
{{- $svcPort = .Values.backend.service.port | default 80 -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "imageengine.fullname" . }}-ingress
  annotations:
    {{- include "imageengine.ingressAnnotations" . | nindent 4 }}
spec:
  ingressClassName: {{ include "imageengine.ingressClass" . }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: "{{ . }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $svcName }}
                port:
                  number: {{ $svcPort }}
    {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - secretName: {{ .secretName }}
      hosts:
        {{- range .hosts }}
        - "{{ . }}"
        {{- end }}
    {{- end }}
  {{- end }}

{{- end -}}
