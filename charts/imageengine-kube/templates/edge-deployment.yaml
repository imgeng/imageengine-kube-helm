{{- if .Values.frontend.enabled }}
# ImageEngine Kube Edge Proxy Deployment
# Go edge proxy: traffic entry point, WURFL device detection, admission control
# Traffic flow: LoadBalancer -> edge:8080 -> varnish:8080 -> backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "imageengine.fullname" . }}-edge
spec:
  replicas: {{ .Values.edge.replicaCount }}
  minReadySeconds: {{ .Values.edge.minReadySeconds | default 0 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: {{ include "imageengine.name" . }}
      tier: edge
  template:
    metadata:
      labels:
        app: {{ include "imageengine.name" . }}
        tier: edge
      {{- with .Values.edge.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        fsGroup: 1000
      imagePullSecrets:
        - name: {{ .Values.secrets.imagePullSecretName }}
      {{- with .Values.edge.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.edge.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.edge.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.edge.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ include "imageengine.name" . }}
              tier: edge
      {{- end }}
      containers:
        - name: edge
          image: "{{ .Values.edge.image.repository }}:{{ .Values.images.edge }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
          resources:
            {{- toYaml .Values.edge.resources | nindent 12 }}
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9464
              name: metrics
          readinessProbe:
            httpGet:
              # /health lives on the edge admin listener (EDGE_METRICS_ADDR,
              # default :9464) so the customer-facing port is free to proxy
              # /health to customer origins. Coupled to wit-frontend:
              # the legacy /status endpoint was removed in the same release.
              path: /health
              port: 9464
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            # Varnish sharding (ADR 0018): the edge discovers Varnish shards via
            # the headless Service's SRV records and routes each image to its
            # owning shard (rendezvous hashing). Requires a sharding-capable edge
            # image; scale shards with varnish.replicaCount (no edge redeploy).
            - name: EDGE_VARNISH_HEADLESS
              value: "{{ include "imageengine.fullname" . }}-varnish-headless.{{ .Release.Namespace }}.svc.cluster.local"
            - name: COMPONENT
              value: "edge"
            - name: EDGE_SENTRY_DSN
              value: {{ .Values.sentry.FRONTEND_DSN | quote }}
            {{- if not (hasKey (default (dict) .Values.edge.env) "EDGE_API_KEY") }}
            - name: EDGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ie-kube-api-key
                  key: KEY
            {{- end }}
            {{- if not (hasKey (default (dict) .Values.edge.env) "EDGE_EMITTER_SERVER_KEY") }}
            - name: EDGE_EMITTER_SERVER_KEY
              value: "api-key:$(EDGE_API_KEY)"
            {{- end }}
            {{- if not (hasKey (default (dict) .Values.edge.env) "EDGE_EMITTER_BAN_KEY") }}
            - name: EDGE_EMITTER_BAN_KEY
              value: "api-key:$(EDGE_API_KEY)"
            {{- end }}
            - name: EDGE_API_URL
              value: {{ .Values.imageengine.imageEngineApiUrl | quote }}
            {{- include "imageengine.identityEnv" $ | nindent 12 }}
            {{- include "imageengine.derivedEnv" (dict "name" "EDGE_EMITTER_SERVER" "value" $.Values.imageengine.emitterServer "env" $.Values.edge.env) | nindent 12 }}
            {{- include "imageengine.otelEnv" (dict "ctx" $ "enableVar" "EDGE_OTEL_ENABLED") | nindent 12 }}
            {{- /* carbon.txt is served ONLY with BOTH a hash AND customer content. See values.yaml. */}}
            {{- if and .Values.edge.carbontxt.enabled .Values.edge.carbontxt.hash .Values.edge.carbontxt.content }}
            - name: EDGE_CARBONTXT_HASH
              value: {{ .Values.edge.carbontxt.hash | quote }}
            - name: EDGE_CARBONTXT_FILE
              value: "/usr/share/iee/carbon.txt"
            {{- end }}
            {{- range $key, $value := .Values.edge.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            {{- if and .Values.edge.carbontxt.enabled .Values.edge.carbontxt.hash .Values.edge.carbontxt.content }}
            - name: carbontxt
              mountPath: /usr/share/iee/carbon.txt
              subPath: carbon.txt
              readOnly: true
            {{- end }}
      volumes:
        {{- if and .Values.edge.carbontxt.enabled .Values.edge.carbontxt.hash .Values.edge.carbontxt.content }}
        - name: carbontxt
          configMap:
            name: {{ include "imageengine.fullname" . }}-carbontxt
        {{- end }}
{{- end }}
