{{- if .Values.frontend.enabled }}
{{/*
The user-facing edge Service. Type is configurable via service.type
(LoadBalancer by default; ClusterIP for installs that front the chart with
their own ingress; NodePort for environments without a LB controller).
Rendered only when the frontend tier is enabled (ADR 0021).
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "imageengine.fullname" . }}-edge
  labels:
    app: {{ include "imageengine.name" . }}
    tier: edge
  {{- $serviceAnnotations := include "imageengine.serviceAnnotations" . }}
  {{- if trim $serviceAnnotations }}
  annotations:
    {{- $serviceAnnotations | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.externalTrafficPolicy }}
  externalTrafficPolicy: {{ . }}
  {{- end }}
  {{- with .Values.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    app: {{ include "imageengine.name" . }}
    tier: edge
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 8080

---
{{/* Internal cluster-only services for component-to-component traffic. */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "imageengine.fullname" . }}-varnish
  labels:
    app: {{ include "imageengine.name" . }}
    tier: varnish
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: {{ include "imageengine.name" . }}
    tier: varnish

---
# Headless Service governing the Varnish StatefulSet (ADR 0018). clusterIP: None
# makes DNS return per-pod SRV/A records with stable ordinal names
# (<release>-varnish-<n>.<release>-varnish-headless), which the edge discovers
# via _varnish._tcp.<this-name> and shards across. The ClusterIP above is kept
# only for debug/health — sharded clients must NOT use it (it round-robins).
# publishNotReadyAddresses: true so a shard resolves during startup, keeping the
# ring at full size while a pod warms (the edge fails over to a peer meanwhile).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "imageengine.fullname" . }}-varnish-headless
  labels:
    app: {{ include "imageengine.name" . }}
    tier: varnish
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: varnish
      port: 8080
      targetPort: 8080
  selector:
    app: {{ include "imageengine.name" . }}
    tier: varnish
{{- end }}

{{- if .Values.backendStack.enabled }}
---
{{/*
Backend Service. type is ClusterIP by default (in-cluster edge/varnish -> backend
hop). A backend-only install serving remote frontend tiers sets
backend.service.type: LoadBalancer. Provider LB presets are intentionally NOT
merged here — only backend.service.annotations are rendered — so a backend LB
defaults private. SECURITY: the backend listener carries unauthenticated admin
endpoints and Varnish speaks plain HTTP, so a backend LoadBalancer must be
private or source-range restricted (ADR 0021; see docs/TOPOLOGIES.md).
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "imageengine.fullname" . }}-backend
  labels:
    app: {{ include "imageengine.name" . }}
    tier: backend
  {{- with .Values.backend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- /* Emit type only when non-default so a default (ClusterIP) backend Service
         stays byte-identical to pre-1.9.0 output — no GitOps drift on upgrade. */}}
  {{- $backendType := .Values.backend.service.type | default "ClusterIP" }}
  {{- if ne $backendType "ClusterIP" }}
  type: {{ $backendType }}
  {{- end }}
  {{- with .Values.backend.service.externalTrafficPolicy }}
  externalTrafficPolicy: {{ . }}
  {{- end }}
  {{- with .Values.backend.service.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
    - port: {{ .Values.backend.service.port | default 80 }}
      targetPort: 8000
  selector:
    app: {{ include "imageengine.name" . }}
    tier: backend

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "imageengine.fullname" . }}-processor
  labels:
    app: {{ include "imageengine.name" . }}
    tier: processor
spec:
  ports:
    - port: 80
      targetPort: 8000
  selector:
    app: {{ include "imageengine.name" . }}
    tier: processor

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "imageengine.fullname" . }}-fetcher
  labels:
    app: {{ include "imageengine.name" . }}
    tier: fetcher
spec:
  ports:
    - port: 80
      targetPort: 8000
  selector:
    app: {{ include "imageengine.name" . }}
    tier: fetcher
{{- end }}
