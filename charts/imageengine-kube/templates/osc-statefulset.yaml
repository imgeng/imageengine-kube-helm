# ImageEngine Kube Object Storage Cache (OSC) StatefulSet
# Each ordinal (osc-0, osc-1, ...) is an independent cache shard with its own
# PersistentVolume. Clients (backend/fetcher/processor) consistent-hash the
# origin key across shards via the OSC sharding client, so each shard owns a
# disjoint slice of the keyspace -- no shared-volume write races, and losing a
# shard is a 1/N cache dip, not a full miss storm. The governing headless
# Service gives each pod a stable DNS name used for OSC[N]_HOST wiring.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "imageengine.fullname" . }}-osc
  labels:
    app: {{ include "imageengine.name" . }}
    tier: object-storage
spec:
  serviceName: {{ include "imageengine.fullname" . }}-osc-headless
  replicas: {{ .Values.objectStorageCache.replicaCount }}
  minReadySeconds: {{ .Values.objectStorageCache.minReadySeconds | default 0 }}
  # Shards have no ordering dependency on each other, so bring them up/down in
  # parallel rather than one ordinal at a time.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: {{ include "imageengine.name" . }}
      tier: object-storage
  template:
    metadata:
      labels:
        app: {{ include "imageengine.name" . }}
        tier: object-storage
      {{- with .Values.objectStorageCache.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      {{- with .Values.objectStorageCache.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      imagePullSecrets:
        - name: {{ .Values.secrets.imagePullSecretName }}
      {{- with .Values.objectStorageCache.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.objectStorageCache.affinity }}
      affinity:
        {{- toYaml .Values.objectStorageCache.affinity | nindent 8 }}
      {{- else }}
      # Default: softly push each shard onto a different node so a single node
      # loss takes out at most one shard. Soft (preferred) so scheduling
      # never blocks on small clusters. Override via objectStorageCache.affinity.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: {{ include "imageengine.name" . }}
                    tier: object-storage
      {{- end }}
      {{- with .Values.objectStorageCache.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Spread shards across nodes and zones. Soft (ScheduleAnyway) so a
      # capacity-constrained cluster can still place every shard.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ include "imageengine.name" . }}
              tier: object-storage
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ include "imageengine.name" . }}
              tier: object-storage
      containers:
        - name: object-storage-cache
          image: "{{ .Values.objectStorageCache.image.repository }}:{{ .Values.images.osc }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
              - ALL
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.objectStorageCache.resources | nindent 12 }}
          volumeMounts:
            # Path where origin images and processed images are stored
            - name: osc-storage
              mountPath: {{ .Values.objectStorageCache.storagePath }}
          env:
            - name: OSC_BIND_HOSTPORT
              value: "0.0.0.0:8000"
            - name: OSC_STATSD_SYSLOG_ADDRESS
              value: "{{ include "imageengine.fullname" . }}-rsyslog:514"
            - name: OSC_SENTRY_DSN
              value: {{ .Values.sentry.OSC_DSN | quote }}
            # Secrets
            - name: IE_KUBE_API_KEY_RAW
              valueFrom:
                secretKeyRef:
                  name: ie-kube-api-key
                  key: KEY
            - name: OSC_EMITTER_CHANNEL_KEY
              value: "api-key:$(IE_KUBE_API_KEY_RAW)"
            # TODO: we can't send messages with a api-key, the app needs to deal with this
            - name: OSC_EMITTER_RESULT_CHANNEL_KEY
              value: "api-key:$(IE_KUBE_API_KEY_RAW)"
            # Env vars for statistics
            {{- range $key, $value := .Values.identity }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            # Env vars below this line are from values.yaml
            {{- range $key, $value := .Values.objectStorageCache.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
      {{- if not .Values.objectStorageCache.persistence.enabled }}
      volumes:
        - name: osc-storage
          emptyDir: {}
      {{- end }}
  {{- if .Values.objectStorageCache.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: osc-storage
        labels:
          app: {{ include "imageengine.name" . }}
          tier: object-storage
      spec:
        accessModes:
          - ReadWriteOnce            # Each shard's volume is mounted by a single pod
        resources:
          requests:
            storage: {{ .Values.objectStorageCache.persistence.size }}
        storageClassName: {{ include "imageengine.storageClass" . }}
  {{- end }}
