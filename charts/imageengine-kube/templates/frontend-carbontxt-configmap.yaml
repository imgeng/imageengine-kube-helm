# ConfigMap for custom carbon.txt content. Only created when GWF verification is
# enabled AND the customer supplied both a hash and their own content — the edge
# never serves its embedded ScientiaMobile default for a customer deployment.
{{- if and .Values.edge.carbontxt.enabled .Values.edge.carbontxt.hash .Values.edge.carbontxt.content }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "imageengine.fullname" . }}-carbontxt
  labels:
    app: {{ include "imageengine.name" . }}
    tier: edge
data:
  carbon.txt: |
{{ .Values.edge.carbontxt.content | indent 4 }}
{{- end }}
