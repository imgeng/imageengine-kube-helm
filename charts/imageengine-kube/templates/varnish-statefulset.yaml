{{- if .Values.frontend.enabled }}
# ImageEngine Kube Varnish Cache StatefulSet (ADR 0018)
# Each ordinal (varnish-0, varnish-1, ...) is an independent cache shard. The
# edge discovers shards via the governing headless Service's SRV records and
# routes every permutation of an image to the same shard using rendezvous (HRW)
# hashing, so each image is cached on exactly one shard -- no cross-replica
# duplication, and losing a shard is a 1/N cache dip (refilled from OSC), not a
# full miss storm. No PersistentVolume: open-source Varnish cannot reuse its
# on-disk cache across restart, so stable identity (not storage) is why this is
# a StatefulSet.
# Traffic flow: edge -> varnish-<n>:8080 -> backend
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "imageengine.fullname" . }}-varnish
spec:
  serviceName: {{ include "imageengine.fullname" . }}-varnish-headless
  replicas: {{ .Values.varnish.replicaCount }}
  minReadySeconds: {{ .Values.varnish.minReadySeconds | default 0 }}
  # Shards have no ordering dependency, so cycle them in parallel.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: {{ include "imageengine.name" . }}
      tier: varnish
  template:
    metadata:
      labels:
        app: {{ include "imageengine.name" . }}
        tier: varnish
      {{- with .Values.varnish.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        fsGroup: 1000
      # Graceful shutdown: the preStop sleep gives kube-proxy/endpoints time to
      # stop routing new requests and lets in-flight requests drain before
      # varnishd receives SIGTERM, so a planned move doesn't error live traffic.
      terminationGracePeriodSeconds: {{ .Values.varnish.terminationGracePeriodSeconds | default 30 }}
      {{- with .Values.varnish.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      imagePullSecrets:
        - name: {{ .Values.secrets.imagePullSecretName }}
      {{- with .Values.varnish.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.varnish.affinity }}
      affinity:
        {{- toYaml .Values.varnish.affinity | nindent 8 }}
      {{- else }}
      # Default: softly push each shard onto a different node so a single node
      # loss takes out at most one shard. Soft (preferred) so scheduling never
      # blocks on small clusters. Override via varnish.affinity.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: {{ include "imageengine.name" . }}
                    tier: varnish
      {{- end }}
      {{- with .Values.varnish.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.varnish.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      # Spread shards across nodes and zones. Soft (ScheduleAnyway) so a
      # capacity-constrained cluster can still place every shard. Override via
      # varnish.topologySpreadConstraints (e.g. DoNotSchedule to force each shard
      # onto a distinct node for node-failure resilience testing).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ include "imageengine.name" . }}
              tier: varnish
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ include "imageengine.name" . }}
              tier: varnish
      {{- end }}
      containers:
        - name: varnish
          image: "{{ .Values.varnish.image.repository }}:{{ .Values.images.varnish }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
              add:
              - DAC_OVERRIDE
              - CHOWN
              - SETUID
              - SETGID
              # Varnish 9's unix jail (vju_fixfd) fchmod()s its workdir fds to 0750
              # on startup; without FOWNER that fails with EPERM and varnishd asserts.
              - FOWNER
          resources:
            {{- toYaml .Values.varnish.resources | nindent 12 }}
          {{- if gt (int .Values.varnish.drainSeconds) 0 }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ int .Values.varnish.drainSeconds }}"]
          {{- end }}
          ports:
            # The port NAME ("varnish") is what the headless Service publishes as
            # an SRV record (_varnish._tcp.<headless>), which the edge queries.
            - containerPort: 8080
              name: varnish
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: IE_BACKENDS
              value: {{ default (printf "%s-backend" (include "imageengine.fullname" .)) .Values.varnish.ieBackends | quote }}
            - name: COMPONENT
              value: "varnish"
            - name: VARNISH_LISTEN_PORT
              value: "8080"
            {{- include "imageengine.identityEnv" $ | nindent 12 }}
            {{- include "imageengine.derivedEnv" (dict "name" "APP_ENV" "value" (include "imageengine.appEnv" $) "env" $.Values.varnish.env) | nindent 12 }}
            {{- include "imageengine.renderEnv" .Values.varnish.env | nindent 12 }}
{{- end }}
