{{- if .Values.backendStack.enabled }}
# ImageEngine Kube Object Storage Cache Service
# ClusterIP service kept for ad-hoc/debug access and health checks. Sharded
# clients do NOT use this (it would round-robin across shards); they address
# individual shards via the headless service's stable per-pod DNS names below.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "imageengine.fullname" . }}-osc
  labels:
    app: {{ include "imageengine.name" . }}
    tier: object-storage
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.objectStorageCache.service.port }}
      targetPort: 8000
  selector:
    app: {{ include "imageengine.name" . }}
    tier: object-storage

---
# Headless service governing the OSC StatefulSet. clusterIP: None makes DNS
# return per-pod A records (e.g. <release>-osc-2.<release>-osc-headless), which
# are stable across reschedules. The named "osc" port also yields SRV records
# (_osc._tcp.<headless>) that the sharding client uses to discover shards and
# their ordinals (OSCCLIENT_SRV_NAME, ADR 0019). publishNotReadyAddresses: true
# so a shard's name resolves during startup, letting clients establish the pool
# without waiting for readiness.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "imageengine.fullname" . }}-osc-headless
  labels:
    app: {{ include "imageengine.name" . }}
    tier: object-storage
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: osc
      port: 8000
      targetPort: 8000
  selector:
    app: {{ include "imageengine.name" . }}
    tier: object-storage
{{- end }}
